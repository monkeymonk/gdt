name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        go: ["1.23"]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go }}

      - name: Build
        run: go build ./...

      - name: Vet
        run: go vet ./...

      - name: Test
        shell: bash
        run: go test -race -coverprofile=coverage.out ./...

      - name: Check formatting
        if: matrix.os == 'ubuntu-latest'
        run: |
          if [ -n "$(gofmt -l $(find . -name '*.go' -not -path './_plugins/*'))" ]; then
            echo "Files not formatted:"
            gofmt -l $(find . -name '*.go' -not -path './_plugins/*')
            exit 1
          fi

      - name: Upload coverage
        if: matrix.os == 'ubuntu-latest'
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage.out
